components:
- components:
  - components:
    - layout_properties: {grid_position: 'IZBYZM,SMHNFV'}
      name: rich_text_1
      properties:
        content: "## Welcome to Stock Tools! \n##\nThis app is aimed to do stock calculations based on different short and long terms strategies. All the tools are located in the side menu. \n##\nThank you for using Stock Tools!"
      type: RichText
    layout_properties: {grid_position: 'ZDPROM,XHZRUN'}
    name: column_panel_2
    properties: {role: elevated-card}
    type: ColumnPanel
  - layout_properties: {grid_position: 'PLQPQE,YVDDGE'}
    name: rich_text_2
    properties: {align: center, content: made with ❤️ by bitmustache apps}
    type: RichText
  - data_bindings: []
    layout_properties: {grid_position: 'NNUPWI,ZSBKOI'}
    name: rich_text_3
    properties:
      content: |-
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4787864388418651"
             crossorigin="anonymous"></script>
        <!-- Horizontal Responsive -->
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-4787864388418651"
             data-ad-slot="1877386277"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
      format: restricted_html
    type: RichText
  layout_properties: {slot: default}
  name: content_panel
  properties: {col_widths: '{}'}
  type: ColumnPanel
- layout_properties: {slot: nav-right}
  name: navbar_links
  properties: {}
  type: FlowPanel
- components:
